# Railway: use Docker so builds do not depend on Railpack + a dashboard "Build Command".
# In the service UI, clear any custom Build Command (empty = use this file + Dockerfile).
# Migrations: run manually in Railway → Shell → `python manage.py migrate --noinput`
# (pre-deploy may lack `python`; migrate-in-CMD breaks HTTP health checks during startup.)

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/api/tracks/"
healthcheckTimeout = 180
