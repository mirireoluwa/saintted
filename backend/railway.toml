# Railway config-as-code. Set the service Root Directory to `backend`.
# Do NOT set a custom [build].buildCommand here: it replaces Railpack's install step,
# so `pip` is never on PATH. Railpack auto-installs from requirements.txt when it
# sees manage.py + requirements.txt in this directory.

[deploy]
preDeployCommand = ["python manage.py collectstatic --noinput && python manage.py migrate --noinput"]
startCommand = "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
healthcheckPath = "/api/tracks/"
healthcheckTimeout = 100
