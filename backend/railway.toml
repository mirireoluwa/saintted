# Railway: use Docker so builds do not depend on Railpack + a dashboard "Build Command".
# In the service UI, clear any custom Build Command (empty = use this file + Dockerfile).
# Migrations: `railway ssh` then `python3 manage.py migrate --noinput` (see README).
# (pre-deploy may lack `python`; migrate-in-CMD breaks HTTP health checks during startup.)

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Do not set startCommand here: Railway may run it without a shell, so `$PORT` is not expanded
# and Gunicorn never binds (healthcheck → "service unavailable"). The image CMD uses `sh -c`
# with `${PORT:-8000}` — see backend/Dockerfile.
# Use `/` not `/api/tracks/`: the tracks list hits the DB; unmigrated Postgres makes that 500 and
# the deploy never becomes healthy ("service unavailable"). Root is cheap JSON (see config/urls.py).
healthcheckPath = "/"
healthcheckTimeout = 180
