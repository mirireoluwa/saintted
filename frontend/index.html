<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Match system theme before React (see ThemeContext saintted-theme-mode) -->
    <script>
      (function () {
        try {
          var k = "saintted-theme-mode";
          var m = localStorage.getItem(k);
          if (m === "light" || m === "dark") {
            document.documentElement.setAttribute("data-theme", m);
            return;
          }
          var legacy = localStorage.getItem("saintted-theme");
          if (legacy === "light" || legacy === "dark") {
            document.documentElement.setAttribute("data-theme", legacy);
            return;
          }
          document.documentElement.setAttribute(
            "data-theme",
            window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark"
          );
        } catch (e) {}
      })();
    </script>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A Nigerian artist and producer creating experimental alternative and afrobeats songs. Stream singles, watch official videos, and explore the latest releases."
    />
    <meta name="robots" content="index,follow,max-snippet:220,max-image-preview:large" />
    <!-- Link preview (og:image needs absolute URL — set VITE_SITE_URL in .env for your domain) -->
    <link rel="canonical" href="%SITE_URL%/" />
