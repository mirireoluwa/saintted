# Render Blueprint: Web service + PostgreSQL for the Django API.
# Dashboard: New → Blueprint → connect repo (apply this file), or create services manually using the same commands.
#
# After deploy: copy the web service URL, set Vercel VITE_API_URL to https://<service>.onrender.com/api
# and set CORS_ORIGINS / CSRF_TRUSTED_ORIGINS (see README).

databases:
  - name: saintted-db
    databaseName: saintted
    user: saintted

services:
  - type: web
    name: saintted-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: saintted-db
          property: connectionString
      # Set in dashboard to your Vercel URL(s), comma-separated, no spaces:
      # https://your-app.vercel.app,https://saintted.com,https://www.saintted.com
      - key: CORS_ORIGINS
        sync: false
      # Same origins as CORS for browser admin + SPA token login (https://… only)
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      # Optional: explicit hostname (comma-separated). .onrender.com is allowed automatically when DEBUG=0
      - key: DJANGO_ALLOWED_HOSTS
        sync: false
